steps:
# 1. Install dependencies using a guaranteed modern Node.js 20 image (fixes EBADENGINE warnings)
- name: 'node:20' 
  entrypoint: 'npm'
  args: ['install']

# 2. Build the Next.js application (creates the /out directory for static hosting)
- name: 'node:20'
  entrypoint: 'npm'
  args: ['run', 'build']

# 3. Deploy the application to Firebase Hosting
- name: 'gcr.io/firebase/firebase-cli:latest'
  args: ['deploy', '--only', 'hosting', '--project', '${PROJECT_ID}']
  env:
    - 'FIREBASE_TOKEN=${_FIREBASE_TOKEN}' # Ensure this environment variable is set in the trigger

# 4. Deploy the Firebase Functions (if your project includes a 'functions' directory)
- name: 'gcr.io/firebase/firebase-cli:latest'
  args: ['deploy', '--only', 'functions', '--project', '${PROJECT_ID}']
  env:
    - 'FIREBASE_TOKEN=${_FIREBASE_TOKEN}' # Ensure this environment variable is set in the trigger

timeout: '1600s'
